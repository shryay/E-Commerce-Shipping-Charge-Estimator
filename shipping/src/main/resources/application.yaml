spring:
  datasource:
    url: jdbc:h2:mem:shippingdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: embedded

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
